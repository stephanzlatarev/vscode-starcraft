<!-- Fragment start -->

<span class="head">Create game vs</span>
<form style="display: inline">
  <select id="race">
    <option value="3">Protoss</option>
    <option value="1">Terran</option>
    <option value="2">Zerg</option>
    <option value="4" selected="true">Random</option>
  </select>
  <select id="opponent">
    <optgroup label="Built-in AI">
      <option value="1">Very Easy</option>
      <option value="2">Easy</option>
      <option value="3">Medium</option>
      <option value="4">Hard</option>
      <option value="5">Harder</option>
      <option value="6">Very Hard</option>
      <option value="7" selected="true">Elite</option>
      <option value="8">Cheater (Vision)</option>
      <option value="9">Cheater (Resources)</option>
      <option value="10">Cheater (Insane)</option>
    </optgroup>
    <optgroup id="bots-group" label="Bot">
    </optgroup>
  </select>
  <select id="build">
    <option value="1" selected="true">Random build</option>
    <option value="2">Rush</option>
    <option value="3">Timing</option>
    <option value="4">Power</option>
    <option value="5">Macro</option>
    <option value="6">Air</option>
  </select>
  on
  <select id="map">
  </select>

  <button id="save" type="button">Start</button>
</form>

<script>
  const vscode = acquireVsCodeApi();

  let template = {};

  function prettyMapName(name) {
    const aie = name.endsWith("AIE.SC2Map");
    const raw = aie ? name.replace("AIE.SC2Map", "") : name.replace(".SC2Map", "");

    // Insert spaces before uppercase letters (except the first letter)
    return raw.replace(/([a-z])([A-Z])/g, '$1 $2') + (aie ? " AIE" : "");
  }

  function isBot(value) {
    return isNaN(Number(value));
  }

  function updateBuildVisibility() {
    document.getElementById("build").style.display = isBot(document.getElementById("opponent").value) ? "none" : "";
  }

  document.getElementById("opponent").addEventListener("change", updateBuildVisibility);

  document.getElementById("save").addEventListener("click", function() {
    const opponentValue = document.getElementById("opponent").value;
    const message = {
      type: "host",
      map: document.getElementById("map").value,
      race: Number(document.getElementById("race").value),
    };

    if (isBot(opponentValue)) {
      message.bot = opponentValue;
    } else {
      message.difficulty = Number(opponentValue);
      message.build = Number(document.getElementById("build").value);
    }

    vscode.postMessage(message);
  });

  window.addEventListener("message", event => {
    const message = event.data;

    if (message.type === "maps") {
      const select = document.getElementById("map");
      select.innerHTML = "";

      for (const name of message.maps) {
        const option = document.createElement("option");

        option.value = name;
        option.textContent = prettyMapName(name);

        select.appendChild(option);
      }

      if (template.map) select.value = template.map;
    } else if (message.type === "template") {
      template = message.template;

      if (template.map) document.getElementById("map").value = template.map;
      if (template.race) document.getElementById("race").value = template.race;
      if (template.difficulty) document.getElementById("opponent").value = template.difficulty;
      if (template.build) document.getElementById("build").value = template.build;
      if (template.bot) document.getElementById("opponent").value = template.bot;
      updateBuildVisibility();
    } else if (message.type === "bots") {
      const group = document.getElementById("bots-group");
      group.innerHTML = "";

      for (const name of message.bots) {
        const option = document.createElement("option");

        option.value = name;
        option.textContent = name;

        group.appendChild(option);
      }

      if (template.bot) {
        document.getElementById("opponent").value = template.bot;
        updateBuildVisibility();
      }
    }
  });

  vscode.postMessage({ type: "maps" });
  vscode.postMessage({ type: "bots" });
  vscode.postMessage({ type: "template" });
</script>
<!-- Fragment end -->
